<section class="contact full-width">
    <!--  見出し -->
    <h2 class="heading sec__heading_contact">お問い合わせ</h2>
    <!-- フォーム -->
    <div class="contactForm" id="contactForm">
        <div class="contact_item">
            <label class="label" for ="name">氏名<span class="label_tag label_must">必須</span></label>
            [text* your-name]
        </div>
        <div class="contact_item">
            <label class="label" for="mail">メールアドレス<span class="label_tag label_must">必須</span>
            </label>
            [email* your-email]
        </div>
        <div class="contact_item">
            <label class="label" for="comment">お問い合わせ内容<span class="label_tag label_must">必須</span>
            </label>
            [textarea* your-message]
        </div>
        <!-- ボタン -->
        <div class="btnArea">[submit id:formbtn "送信"]</div>
    </div><!--contactForm-->
</section><!--End section_contact-->
